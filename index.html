<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notekeeper - Your Everyday Notes | Effortless Note-Taking</title>
    <meta name="title" content="Notekeeper - Your Everyday Notes | Effortless Note-Taking">
    <meta name="description" content="Streamline your daily note-taking with Notekeeper. Organize, access, and enhance productivity with ease.">
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    <script src="./src/js/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="./src/css/style.css">
    <script type="module" src="./src/js/app.js"></script>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<header class="top-bar">
    <!-- Logo only — no hamburger here -->
    <a href="" class="logo top-bar-logo">
        <img src="./src/images/logo-light.svg" alt="Notekeeper" class="logo-light">
        <img src="./src/images/logo-dark.svg" alt="Notekeeper" class="logo-dark">
    </a>

    <!-- Centered search bar -->
    <div class="search-bar">
        <span class="material-symbols-rounded search-icon" aria-hidden="true">search</span>
        <input type="text" placeholder="Search" data-search-input>
    </div>

    <!-- Right: greeting + theme toggle -->
    <div class="top-bar-right">
        <div class="greeting-wrapper">
            <p class="title text-title-small" data-greeting></p>
            <span class="text text-label-medium" data-current-date></span>
        </div>
        <button class="theme-btn icon-btn large" aria-label="Toggle theme" data-tooltip="Toggle theme" data-theme-btn>
            <span class="material-symbols-rounded dark-icon" aria-hidden="true">dark_mode</span>
            <span class="material-symbols-rounded light-icon" aria-hidden="true">light_mode</span>
            <div class="state-layer"></div>
        </button>
    </div>
</header>

<!-- ===== APP BODY ===== -->
<div class="app-body">
    <div class="overlay" data-sidebar-overlay></div>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" data-sidebar>

        <!-- Sidebar collapse/expand toggle button -->
        <button class="sidebar-toggle-btn" id="sidebar-edge-toggle" aria-label="Toggle sidebar" data-sidebar-toggler data-tooltip="Collapse sidebar">
            <span class="material-symbols-rounded sidebar-toggle-icon" aria-hidden="true">left_panel_close</span>
            <div class="state-layer"></div>
        </button>

        <!-- Notebooks section -->
        <div class="notebooks-header">
            <span class="section-label text-label-small">NOTEBOOKS</span>
            <button class="icon-btn small" data-add-notebook aria-label="New notebook" data-tooltip="New notebook">
                <span class="material-symbols-rounded" aria-hidden="true">add</span>
                <div class="state-layer"></div>
            </button>
        </div>

        <nav class="nav custom-scrollbar-list" data-sidebar-list>
            <!-- Notebook nav items injected here -->
        </nav>

        <div class="cp-info">
            <div class="text-label-large">© 2026 <strong>ajmal&nasim</strong></div>
        </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="main">
        <!-- Google Keep style note creation bar -->
        <div class="note-create-bar" data-note-create-btn>
            <span class="text-body-large">Take a note...</span>
            <button class="icon-btn" aria-label="New Note">
                <span class="material-symbols-rounded" aria-hidden="true">edit</span>
            </button>
            <div class="state-layer"></div>
        </div>

        <!-- Search results header (shown during search) -->
        <div class="search-results-header" data-search-results-header>
            <span class="results-query" data-results-query></span>
            <span class="results-count" data-results-count></span>
        </div>

        <!-- Notebook title header -->
        <div class="note-panel-header">
            <h2 class="title text-title-large" data-note-panel-title></h2>
        </div>

        <!-- Notes masonry grid -->
        <div class="note-list" data-note-panel></div>

        <!-- Mobile FAB -->
        <button class="mobile-fab" aria-label="New note" data-note-create-btn>
            <span class="material-symbols-rounded" aria-hidden="true">edit</span>
            <div class="state-layer"></div>
        </button>

        <!-- Empty state (centred in .main, shown when no notes) -->
        <div class="empty-notes-area" data-empty-notes-area style="display:none;">
            <span class="material-symbols-rounded" aria-hidden="true">note_add</span>
            <div class="text-headline-small">No notes here. Click to add a new note.</div>
        </div>
    </main>
</div>

</body>
</html>
